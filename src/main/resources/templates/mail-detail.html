<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar('dashboard')}"></nav>

<div class="container">

    <div style="margin-bottom: 1rem;">
        <a href="/" class="btn btn-outline btn-sm">&larr; 목록으로 돌아가기</a>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title" th:text="'메일 #' + (${mail.index()} + 1) + ' / ' + ${totalCount} + '건'">메일 #1</span>
            <span class="badge badge-info" th:text="${mail.contentType()}">text/plain</span>
        </div>

        <div class="detail-section">
            <div class="info-grid" style="margin-bottom: 1rem;">
                <div class="info-item">
                    <label>발신자 (From)</label>
                    <span th:text="${mail.from()}">sender@test.com</span>
                </div>
                <div class="info-item">
                    <label>수신자 (To)</label>
                    <span th:text="${#strings.listJoin(mail.to(), ', ')}">receiver@test.com</span>
                </div>
                <div class="info-item" th:if="${mail.cc() != null && !mail.cc().isEmpty()}">
                    <label>참조 (CC)</label>
                    <span th:text="${#strings.listJoin(mail.cc(), ', ')}"></span>
                </div>
                <div class="info-item">
                    <label>수신 시간</label>
                    <span th:text="${#temporals.format(mail.receivedDate(), 'yyyy-MM-dd HH:mm:ss')}">
                        2025-01-01 12:00:00
                    </span>
                </div>
            </div>
        </div>

        <div class="detail-section">
            <h3>제목</h3>
            <div style="font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem;" th:text="${mail.subject()}">
                제목
            </div>
        </div>

        <div class="detail-section">
            <h3>본문</h3>
            <div class="detail-body" th:text="${mail.body()}">
                메일 본문 내용
            </div>
        </div>
    </div>

    <!-- 이전/다음 네비게이션 -->
    <div class="flex-between">
        <div>
            <a th:if="${mail.index() > 0}"
               th:href="@{'/mails/' + (${mail.index()} - 1)}"
               class="btn btn-outline btn-sm">&larr; 이전 메일</a>
        </div>
        <div>
            <a th:if="${mail.index() < totalCount - 1}"
               th:href="@{'/mails/' + (${mail.index()} + 1)}"
               class="btn btn-outline btn-sm">다음 메일 &rarr;</a>
        </div>
    </div>
</div>

</body>
</html>
